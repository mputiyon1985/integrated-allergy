name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: 'file:./dev.db'
      
      - name: Type check
        run: npx tsc --noEmit
      
      - name: Lint
        run: npm run lint
      
      - name: Build
        run: npm run build
        env:
          DATABASE_URL: 'file:./dev.db'
          DATABASE_AUTH_TOKEN: 'ci-placeholder'
          JWT_SECRET: 'ci-test-secret-not-for-production'
          NEXTAUTH_SECRET: 'ci-test-secret'
          NEXTAUTH_URL: 'http://localhost:3000'
          NODE_ENV: 'test'
